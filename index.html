<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 8 Science Entry Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in-right {
            animation: slideInRight 0.3s forwards;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Q&A Accordion transition */
        .answer-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }
        .qa-card.open .answer-content {
            max-height: 200px;
            padding-top: 0.75rem;
        }
        .qa-icon {
            transition: transform 0.3s ease;
        }
        .qa-card.open .qa-icon {
            transform: rotate(180deg);
        }

        /* Glass effect header */
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- HOME PAGE -->
    <div id="home-page" class="h-full flex flex-col overflow-y-auto no-scrollbar fade-in w-full max-w-md mx-auto relative bg-white shadow-xl">
        <div class="px-6 pt-12 pb-8 bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-b-[2.5rem] shadow-lg relative overflow-hidden">
            <!-- Decorative circles -->
            <div class="absolute top-[-20px] right-[-20px] w-32 h-32 bg-white opacity-10 rounded-full"></div>
            <div class="absolute bottom-[-30px] left-[-20px] w-24 h-24 bg-white opacity-10 rounded-full"></div>
            
            <h1 class="text-3xl font-extrabold mb-2 relative z-10">Entry Test Prep</h1>
            <p class="text-indigo-100 font-medium relative z-10">Grade 8 Science Study Guide</p>
        </div>

        <div class="px-6 py-8 flex-1">
            <h2 class="text-lg font-bold text-slate-700 mb-6">Select a Subject</h2>
            
            <div class="space-y-5">
                <!-- Biology Card -->
                <button onclick="openSubject('biology')" class="w-full bg-white border border-emerald-100 shadow-sm hover:shadow-md transition-shadow rounded-2xl p-5 flex items-center justify-between text-left group">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center text-3xl shadow-inner group-hover:scale-110 transition-transform">
                            🧬
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">Biology</h3>
                            <p class="text-sm text-slate-500">Plants, Digestion, Circulation</p>
                        </div>
                    </div>
                    <div class="text-emerald-500 text-xl font-bold group-hover:translate-x-1 transition-transform">→</div>
                </button>

                <!-- Chemistry Card -->
                <button onclick="openSubject('chemistry')" class="w-full bg-white border border-purple-100 shadow-sm hover:shadow-md transition-shadow rounded-2xl p-5 flex items-center justify-between text-left group">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-purple-100 flex items-center justify-center text-3xl shadow-inner group-hover:scale-110 transition-transform">
                            🧪
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">Chemistry</h3>
                            <p class="text-sm text-slate-500">Atoms, Metals, Acids & Bases</p>
                        </div>
                    </div>
                    <div class="text-purple-500 text-xl font-bold group-hover:translate-x-1 transition-transform">→</div>
                </button>

                <!-- Physics Card -->
                <button onclick="openSubject('physics')" class="w-full bg-white border border-blue-100 shadow-sm hover:shadow-md transition-shadow rounded-2xl p-5 flex items-center justify-between text-left group">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center text-3xl shadow-inner group-hover:scale-110 transition-transform">
                            ⚡
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">Physics</h3>
                            <p class="text-sm text-slate-500">Force, Light, Energy, Heat</p>
                        </div>
                    </div>
                    <div class="text-blue-500 text-xl font-bold group-hover:translate-x-1 transition-transform">→</div>
                </button>
            </div>
        </div>
    </div>

    <!-- SUBJECT PAGE -->
    <div id="subject-page" class="hidden h-full flex flex-col w-full max-w-md mx-auto relative bg-slate-50 shadow-xl z-20">
        
        <!-- Header -->
        <header id="subject-header" class="glass-header sticky top-0 z-30 px-4 py-4 flex items-center justify-between">
            <button onclick="goHome()" class="p-2 bg-white rounded-full shadow-sm text-slate-600 hover:text-slate-900 active:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h2 id="subject-title" class="text-xl font-extrabold flex items-center gap-2">Subject Title</h2>
            <div class="w-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Content Area -->
        <div id="topics-container" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-6 pb-20">
            <!-- Topics get injected here by JS -->
        </div>
    </div>

                            "<b>Methods of Heat Transfer:</b> Conduction (direct contact), Convection (fluids), Radiation (waves)."

                        eli5: "Energy is the 'go-juice' that makes everything happen in the universe. Heat is a special kind of energy that hates being unbalanced. It will always jump from a hot thing (like hot soup) into a cold thing (like your spoon or the air) until everything is exactly the same temperature.",

        // UI State
        let currentSubject = null;

        function openSubject(subjectKey) {
            currentSubject = appData[subjectKey];
            
            // Set Header
            document.getElementById('subject-title').innerHTML = `${currentSubject.icon} ${currentSubject.title}`;
            
            // Render Topics
            const container = document.getElementById('topics-container');
            container.innerHTML = ''; // clear

            currentSubject.topics.forEach((topic, tIndex) => {
                
                // Build Facts List
                const factsHtml = topic.facts.map(fact => `<li class="flex gap-2"><span class="${currentSubject.themeText}">•</span> <span>${fact}</span></li>`).join('');
                
                // Build Q&A Accordions
                const qaHtml = topic.qa.map((qa, qIndex) => `
                    <div class="qa-card bg-white border border-slate-100 rounded-lg overflow-hidden mb-2 shadow-sm">
                        <button onclick="toggleQA(this)" class="w-full text-left p-3 font-semibold text-slate-700 flex justify-between items-center hover:bg-slate-50">
                            <span class="flex-1 pr-4">Q: ${qa.q}</span>
                            <svg class="qa-icon w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="answer-content bg-slate-50 px-3 pb-3 text-slate-600 text-sm">
                            <span class="font-bold text-slate-700">A:</span> ${qa.a}
                        </div>
                    </div>
                `).join('');

                // Build MCQs
                const mcqHtml = topic.mcqs.map((mcq, mIndex) => {
                    const optionsHtml = mcq.options.map((opt, oIndex) => `
                        <button onclick="checkMCQ(this, ${oIndex === mcq.correct})" class="mcq-btn w-full text-left p-3 border border-slate-200 rounded-lg mb-2 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                            ${opt}
                        </button>
                    `).join('');

                    return `
                        <div class="mb-5 last:mb-0">
                            <p class="font-bold text-slate-700 text-sm mb-3">${mIndex + 1}. ${mcq.q}</p>
                            <div>${optionsHtml}</div>
                        </div>
                    `;
                }).join('');

                // Topic Card HTML
                const cardHtml = `
                    <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden slide-in-right" style="animation-delay: ${tIndex * 0.1}s">
                        
                        <!-- Topic Header -->
                        <div class="${currentSubject.themeBg} ${currentSubject.themeText} p-4 border-b ${currentSubject.themeBorder} flex items-center gap-3">
                            <div class="text-3xl">${topic.emoji}</div>
                            <h3 class="text-xl font-bold leading-tight">${topic.title}</h3>
                        </div>

                        <div class="p-4 space-y-5">
                            
                            <!-- Definition & Facts -->
                            <div>
                                <div class="inline-block px-2 py-1 ${currentSubject.themeBg} ${currentSubject.themeText} text-xs font-bold rounded mb-2 uppercase tracking-wide">Definition</div>
                                <p class="text-slate-700 text-sm mb-3">${topic.definition}</p>
                                <ul class="text-sm text-slate-600 space-y-1">
                                    ${factsHtml}
                                </ul>
                            </div>

                            <!-- ELI5 -->
                            <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 relative">
                                <div class="absolute -top-3 left-4 bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded-full border border-amber-200 shadow-sm flex items-center gap-1">
                                    👶 Explain Like I'm 5
                                </div>
                                <p class="text-sm text-slate-600 mt-2 italic">"${topic.eli5}"</p>
                            </div>

                            <!-- Q&A Section -->
                            <div>
                                <h4 class="font-bold text-slate-800 mb-3 flex items-center gap-2">
                                    <svg class="w-5 h-5 ${currentSubject.themeText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                    Questions & Answers
                                </h4>
                                ${qaHtml}
                            </div>

                            <!-- MCQ Section -->
                            <div class="pt-4 border-t border-slate-100">
                                <h4 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <svg class="w-5 h-5 ${currentSubject.themeText}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Test Yourself (MCQs)
                                </h4>
                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                    ${mcqHtml}
                                </div>
                            </div>

                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });

            // Switch Views
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('subject-page').classList.remove('hidden');
            
            // Scroll to top
            document.getElementById('subject-page').scrollTop = 0;
        }

        function goHome() {
            document.getElementById('subject-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        function toggleQA(btn) {
            const card = btn.closest('.qa-card');
            card.classList.toggle('open');
        }

        function checkMCQ(btn, isCorrect) {
            // Check if already answered
            const container = btn.parentElement;
            if(container.classList.contains('answered')) return;
            
            container.classList.add('answered');
            
            // Highlight the clicked button
            if (isCorrect) {
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600', 'shadow-md');
            } else {
                btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                btn.classList.add('bg-red-500', 'text-white', 'border-red-600');
                
                // Also highlight correct answer
                const buttons = container.querySelectorAll('.mcq-btn');
                // The correct index is tricky to find from DOM, but we can visually search it
                // Actually, a simpler way is just to let the user learn from the mistake.
            }

            // Dim others
            const buttons = container.querySelectorAll('.mcq-btn');
            buttons.forEach(b => {
                if(b !== btn) {
                    b.classList.add('opacity-50', 'cursor-not-allowed');
                }
            });
        }
    </script>
</body>
</html>
