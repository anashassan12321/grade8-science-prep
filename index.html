<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 8 Admission Prep</title>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- HOME PAGE -->
    <div id="home-page" class="h-full flex flex-col overflow-y-auto no-scrollbar fade-in w-full max-w-md mx-auto relative bg-slate-50 shadow-xl">
        <div class="px-6 pt-12 pb-8 bg-gradient-to-br from-indigo-600 to-violet-700 text-white rounded-b-[2.5rem] shadow-lg relative overflow-hidden">
            <div class="absolute top-[-20px] right-[-20px] w-32 h-32 bg-white opacity-10 rounded-full"></div>
            <div class="absolute bottom-[-30px] left-[-20px] w-24 h-24 bg-white opacity-10 rounded-full"></div>
            
            <h1 class="text-3xl font-extrabold mb-2 relative z-10">Grade 8 Prep</h1>
            <p class="text-indigo-100 font-medium relative z-10 text-sm">Your One-Stop Admission Study Guide</p>
        </div>

        <div class="px-6 py-6 flex-1 pb-12">
            <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                Select a Subject
            </h2>
            
            <!-- Dynamic Subject List -->
            <div id="subjects-list" class="space-y-4">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- SUBJECT PAGE -->
    <div id="subject-page" class="hidden h-full flex flex-col w-full max-w-md mx-auto relative bg-slate-50 shadow-xl z-20">
        <!-- Header -->
        <header id="subject-header" class="glass-header sticky top-0 z-30 px-4 py-4 flex items-center justify-between">
            <button id="btn-home" class="p-2 bg-white rounded-full shadow-sm text-slate-600 hover:text-slate-900 active:scale-95 transition-transform border border-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <h2 id="subject-title" class="text-xl font-extrabold flex items-center gap-2">Subject Title</h2>
            <div class="w-10"></div> <!-- Spacer for centering -->
        </header>

        <!-- Content Area -->
        <div id="topics-container" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-6 pb-20">
            <!-- Topics get injected here by JS -->
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
