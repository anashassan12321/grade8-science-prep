<!DOCTYPE html>
<html lang="en">
<head>
    <style>/* critical CSS — inlined to avoid FOUC */
    html,body{margin:0;padding:0;background:#020617;color:#f1f5b9;font-family:system-ui,-apple-system,sans-serif;}
    body{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Grade 8 admission prep — Math, Biology, Chemistry, Physics study cards with randomized tests."><meta name="theme-color" content="#020617"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><title>Grade 8 Admission Prep</title>
</head>
<body class="text-slate-100 antialiased h-screen flex flex-col overflow-hidden bg-slate-950">

    <div id="home-page" class="h-full flex flex-col overflow-y-auto no-scrollbar fade-in w-full max-w-md mx-auto relative bg-slate-900 shadow-2xl">
        <!-- Gradient banner with animated gradient + floating decorative circles + sparkles -->
        <div class="px-6 py-12 animated-gradient bg-gradient-to-br from-indigo-600 via-violet-600 to-fuchsia-600 text-white rounded-b-[2.5rem] shadow-lg relative overflow-hidden flex flex-col items-center justify-center text-center min-h-[180px]">
            <div class="hero-glow"></div>
            <div class="absolute top-[-20px] right-[-20px] w-32 h-32 bg-white opacity-10 rounded-full float-slow"></div>
            <div class="absolute bottom-[-30px] left-[-20px] w-24 h-24 bg-white opacity-10 rounded-full float-slower"></div>
            <!-- ambient sparkle particles -->
            <div class="sparkle" style="top:20%;left:18%;animation-delay:.4s"></div>
            <div class="sparkle" style="top:65%;right:22%;animation-delay:1.2s"></div>
            <div class="sparkle" style="top:35%;left:75%;animation-delay:2.1s"></div>
            <div class="sparkle" style="top:80%;left:30%;animation-delay:0.8s"></div>
            <div class="sparkle" style="top:15%;right:40%;animation-delay:2.7s"></div>

            <h1 class="text-3xl font-extrabold relative z-10 drop-shadow-lg gradient-text">Grade 8 Prep</h1>
            <p class="text-indigo-100 font-medium relative z-10 text-sm mt-1">Your One-Stop Admission Study Guide</p>
        </div>

        <div class="px-6 py-6 flex-1 pb-12">
            <div id="subjects-list" class="space-y-4 pt-2">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
